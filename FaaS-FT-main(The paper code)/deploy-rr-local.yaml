apiVersion: apps/v1
kind: Deployment
metadata:
  name: router-rr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: router-rr
  template:
    metadata:
      labels:
        app: router-rr
    spec:
      containers:
      - name: router-rr
        image: router-rr:1.0
        imagePullPolicy: Never
        env:
        - name: BACKEND_SERVERS
          value: "fibonacci-backend.default.svc.cluster.local"
        ports:
        - containerPort: 8082
---
apiVersion: v1
kind: Service
metadata:
  name: router-rr
  labels:
    app: router-rr
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 8082
    nodePort: 31028
  selector:
    app: router-rr