apiVersion: v1
kind: Service
metadata:
  name: fibonacci-service
spec:
  selector:
    app: fibonacci
  ports:
    - port: 80
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fibonacci-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fibonacci
  template:
    metadata:
      labels:
        app: fibonacci
    spec:
      containers:
      - name: fibonacci
        image: host.docker.internal:5000/fibonacci-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: router-rr
spec:
  type: NodePort
  selector:
    app: router-rr
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 31028
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: router-rr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: router-rr
  template:
    metadata:
      labels:
        app: router-rr
    spec:
      containers:
      - name: router-rr
        image: host.docker.internal:5000/router-rr:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: router-as
spec:
  type: NodePort
  selector:
    app: router-as
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: router-as
spec:
  replicas: 1
  selector:
    matchLabels:
      app: router-as
  template:
    metadata:
      labels:
        app: router-as
    spec:
      containers:
      - name: router-as
        image: host.docker.internal:5000/router-as:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000