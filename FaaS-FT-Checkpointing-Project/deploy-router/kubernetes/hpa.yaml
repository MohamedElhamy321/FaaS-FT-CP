apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: checkpoint-manager-hpa
  namespace: checkpoint-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: checkpoint-manager
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: checkpoint_creation_time_seconds
      target:
        type: AverageValue
        averageValue: "10m"  # 10ms per checkpoint
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
