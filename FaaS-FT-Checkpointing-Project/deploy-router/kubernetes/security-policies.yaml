# Production Hardening Configuration
# Backup, restore, and security enhancements for checkpoint system

# Network Policy for checkpoint-system namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: checkpoint-manager-netpol
  namespace: checkpoint-system
spec:
  podSelector:
    matchLabels:
      app: incremental-checkpoint
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from within namespace
  - from:
    - namespaceSelector:
        matchLabels:
          name: checkpoint-system
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090
  # Allow traffic from monitoring namespace
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 9090
  egress:
  # Allow DNS
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
  # Allow external connections (for potential integrations)
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
---
# Pod Security Policy
apiVersion: policy/v1beta1
kind: PodSecurityPolicy
metadata:
  name: checkpoint-manager-psp
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - 'configMap'
    - 'emptyDir'
    - 'persistentVolumeClaim'
    - 'secret'
  hostNetwork: false
  hostIPC: false
  hostPID: false
  runAsUser:
    rule: 'MustRunAsNonRoot'
  seLinux:
    rule: 'RunAsAny'
  supplementalGroups:
    rule: 'RunAsAny'
  fsGroup:
    rule: 'RunAsAny'
  readOnlyRootFilesystem: false
---
# Resource Quotas
apiVersion: v1
kind: ResourceQuota
metadata:
  name: checkpoint-system-quota
  namespace: checkpoint-system
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "5"
---
# Limit Range
apiVersion: v1
kind: LimitRange
metadata:
  name: checkpoint-system-limits
  namespace: checkpoint-system
spec:
  limits:
  - max:
      cpu: "2"
      memory: "4Gi"
    min:
      cpu: "100m"
      memory: "128Mi"
    default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "250m"
      memory: "256Mi"
    type: Container
