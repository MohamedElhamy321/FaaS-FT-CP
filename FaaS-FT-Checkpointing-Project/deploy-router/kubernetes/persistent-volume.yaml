apiVersion: v1
kind: PersistentVolume
metadata:
  name: checkpoint-pv
  labels:
    app: incremental-checkpoint
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: checkpoint-storage
  hostPath:
    path: /mnt/data/checkpoints
    type: DirectoryOrCreate
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: checkpoint-pvc
  namespace: checkpoint-system
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 50Gi
  storageClassName: checkpoint-storage
