version: '3.8'

services:
  # Incremental Checkpoint Manager
  checkpoint-manager:
    build:
      context: .
      dockerfile: Dockerfile
    image: checkpoint-system:v2.0.0
    container_name: checkpoint-manager
    ports:
      - "8080:8080"   # HTTP API
      - "9090:9090"   # Metrics
    volumes:
      - checkpoint-data:/data/checkpoints
      - ./incremental_checkpoint:/app/incremental_checkpoint:ro
      - ./examples:/app/examples:ro
    environment:
      - CHECKPOINT_DIR=/data/checkpoints
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - checkpoint-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: checkpoint-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./monitoring-tools/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring-tools/prometheus-alerts.yaml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    restart: unless-stopped
    networks:
      - checkpoint-net

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: checkpoint-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring-tools/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/checkpoint.json:ro
      - ./monitoring-tools/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    networks:
      - checkpoint-net
    depends_on:
      - prometheus

volumes:
  checkpoint-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  checkpoint-net:
    driver: bridge
